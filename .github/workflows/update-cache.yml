name: Refresh GitHub Stats Cache

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 */6 * * *' # ירוץ אוטומטית כל 6 שעות באופן קבוע
  workflow_dispatch:

jobs:
  refresh-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Update Cache Buster Timestamp
        run: |
          TIMESTAMP=$(date +%s)

          sed -i "//,// { s/&v=[0-9]*/\&v=$TIMESTAMP/g }" README.md

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff-index --quiet HEAD || git commit -m "chore: update stats cache buster" && git push
