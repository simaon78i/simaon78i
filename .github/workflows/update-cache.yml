name: Refresh GitHub Stats Cache

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

# הגדרת הרשאות כתיבה ישירות בקוד כדי למנוע חסימות
permissions:
  contents: write

jobs:
  refresh-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Update Cache Buster Timestamp
        run: |
          TIMESTAMP=$(date +%s)
          # בדיקה אם התגיות קיימות ומחליפות את ה-Timestamp
          sed -i "//,// { s/&v=[^\"' ]*/\&v=$TIMESTAMP/g }" README.md

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          
          # מונע קריסה (exit code 1) אם הקובץ לא השתנה
          if git diff-index --quiet HEAD; then
            echo "No changes to commit"
          else
            git commit -m "chore: update stats cache buster"
            git push
          fi
