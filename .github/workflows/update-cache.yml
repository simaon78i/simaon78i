name: Refresh GitHub Stats Cache

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Update Cache Buster Timestamp
        run: |
          python -c "
          import time, re
          
          with open('README.md', 'r', encoding='utf-8') as f:
              content = f.read()
          
          # חיפוש כל הקישורים שמכילים את הפרמטר v= ומחליף את הערך שלו ב-Timestamp הנוכחי
          timestamp = str(int(time.time()))
          updated_content = re.sub(r'(&v=[a-zA-Z0-9_-]*)', f'&v={timestamp}', content)
          
          with open('README.md', 'w', encoding='utf-8') as f:
              f.write(updated_content)
          "

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          
          if git diff-index --quiet HEAD; then
            echo "No changes to commit"
          else
            git commit -m "chore: update stats cache buster"
            git push
          fi
